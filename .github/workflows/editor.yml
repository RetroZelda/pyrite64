name: Build & Release

on:
  workflow_dispatch:
  push:
    branches: [ stream/full-frontal ]
    paths-ignore:
      - '**/*.md'
      - 'docs/**'

jobs:
  setup:
    runs-on: ubuntu-latest
    outputs:
      version_tag: ${{ steps.version.outputs.version_tag }}
      build_timestamp: ${{ steps.version.outputs.build_timestamp }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Generate version
        id: version
        run: |
          PROJECT_VERSION=$(grep -m1 'project(pyrite64 VERSION' CMakeLists.txt | sed 's/.*VERSION \([0-9.]*\).*/\1/')
          BUILD_TIMESTAMP=$(TZ=America/New_York date +%Y%m%d-%H%M%S)
          VERSION_TAG="v${PROJECT_VERSION}-Full-Frontal-${BUILD_TIMESTAMP}"
          echo "version_tag=${VERSION_TAG}" >> $GITHUB_OUTPUT
          echo "build_timestamp=${BUILD_TIMESTAMP}" >> $GITHUB_OUTPUT
          echo "Version: ${VERSION_TAG}"

  build-windows:
    needs: setup
    runs-on: windows-latest

    defaults:
      run:
        shell: msys2 {0}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          submodules: recursive
          lfs: true

      - name: Setup MSYS2 (UCRT64)
        uses: msys2/setup-msys2@v2.30.0
        with:
          msystem: UCRT64
          update: true
          cache: true
          install: >
            mingw-w64-ucrt-x86_64-gcc
            mingw-w64-ucrt-x86_64-cmake
            mingw-w64-ucrt-x86_64-ninja
            zip

      - name: Configure CMake
        run: cmake --preset windows-gcc-release -DBUILD_TIMESTAMP_OVERRIDE=${{ needs.setup.outputs.build_timestamp }}

      - name: Build
        run: cmake --build --preset windows-gcc-release

      - name: Package
        run: zip -r pyrite64-windows.zip pyrite64.exe data/ n64/ LICENSE

      - name: Upload artifact
        uses: actions/upload-artifact@v6
        with:
          name: pyrite64-windows-zip
          path: pyrite64-windows.zip

  build-linux:
    needs: setup
    # Built on the oldest supported glibc (ubuntu-22.04 => glibc 2.35)
    # so the resulting AppImage runs on a wide range of distros
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          submodules: recursive
          lfs: true

      # 22.04's apt cmake (3.22) and gcc (11) are too old: the project needs
      # CMake >= 3.28 and C++23. Pull a modern cmake/ninja and gcc-13.
      - name: Setup CMake + Ninja
        uses: lukka/get-cmake@latest

      - name: Install dependencies
        run: |
          sudo add-apt-repository -y ppa:ubuntu-toolchain-r/test
          sudo apt-get update
          sudo apt-get install -y g++-13 \
            libx11-dev libxext-dev libxrandr-dev libxinerama-dev libxcursor-dev libxi-dev libxss-dev libxtst-dev
#            libwayland-dev libwayland-client-dev libwayland-cursor-dev libwayland-egl-dev

      - name: Build AppImage
        env:
          CC: gcc-13
          CXX: g++-13
          BUILD_TIMESTAMP_OVERRIDE: ${{ needs.setup.outputs.build_timestamp }}
        run: |
          ./scripts/build_appimage.sh

      - name: Upload artifact
        uses: actions/upload-artifact@v6
        with:
          name: pyrite64-linux
          path: |
            Pyrite64-x86_64.AppImage

  build-macos:
    # Apple Silicon runner; CMAKE_OSX_ARCHITECTURES builds a universal
    # (arm64 + x86_64) binary so it runs on both Apple Silicon and Intel Macs.
    runs-on: macos-14

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          submodules: recursive
          lfs: true

      # Ensures a CMake >= 3.28 (C++23) and Ninja
      - name: Setup CMake + Ninja
        uses: lukka/get-cmake@latest

      - name: Configure CMake
        run: |
          cmake --preset macos-release

      - name: Build
        run: |
          cmake --build --preset macos-release

      - name: Upload build artifact
        uses: actions/upload-artifact@v6
        with:
          name: pyrite64-macos
          include-hidden-files: true
          path: |
            pyrite64
            data
            n64
            LICENSE

  release:
    needs: [setup, build-windows, build-linux, build-macos]
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: pyrite64-windows-zip

      - name: Download Linux artifact
        uses: actions/download-artifact@v4
        with:
          name: pyrite64-linux

      - name: Download macOS artifact
        uses: actions/download-artifact@v4
        with:
          name: pyrite64-macos

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.setup.outputs.version_tag }}
          name: Pyrite64 ${{ needs.setup.outputs.version_tag }}
          files: |
            pyrite64-windows.zip
            Pyrite64-x86_64.AppImage
            pyrite64
